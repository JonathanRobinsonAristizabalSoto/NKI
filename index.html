<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./src/assets/css/styles.css">
    <script src="./src/assets/js/jquery-3.7.1.min.js"></script>
    <style>
        /* Estilos para el botón circular animado */
        .floating-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #2d3748; /* Usando el color secundario de la paleta */
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease-in-out, background-color 0.3s ease-in-out;
            overflow: hidden;
            text-align: center;
            border: 2px solid #090d23; /* Usando el color secundario de la paleta */
        }

        .floating-button:hover {
            transform: scale(1.1);
            background-color: #e50234; 
        }

        .floating-button i,
        .floating-button span {
            font-size: 24px;
            transition: opacity 0.3s ease-in-out;
        }

        .floating-button span {
            display: none;
            font-size: 16px;
            font-weight: bold; /* Texto en negrita */
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .floating-button.expanded {
            animation: spin 1s linear;
        }

        @keyframes spin {
            from {
                transform: rotateY(0deg);
            }
            to {
                transform: rotateY(360deg);
            }
        }

        /* Mejora de animaciones y estilos */
        .floating-button {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .floating-button:hover {
            animation: none;
        }

        /* Estilos para el botón de WhatsApp */
        .whatsapp-button {
            bottom: 90px; /* Ajusta la posición para que esté encima del botón de pagos */
            background-color: #25D366; /* Color de WhatsApp */
            border: none; /* Sin borde */
        }

        .whatsapp-button:hover {
            background-color: #128C7E; /* Color de WhatsApp al pasar el ratón */
        }
    </style>
</head>
<body class="bg-white text-primary dark:bg-primary dark:text-white relative flex flex-col min-h-screen font-body">

            <button id="menu-btn" class="md:hidden focus:outline-none">

                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16m-7 6h7"></path>
                </svg>
            </button>

            <!-- Menú principal centrado -->
            <nav class="hidden md:flex space-x-6 mx-auto">
                <a href="index.html" class="text-gray-700 hover:text-accent dark:text-white dark:hover:text-secondary">Inicio</a>
                <a href="src/pages/history.html" class="text-gray-700 hover:text-accent dark:text-white dark:hover:text-secondary">Historia</a>

            </nav>

            <!-- Botón de flecha con tema -->
            <div class="relative">

                    <i id="theme-icon" class="fas fa-moon"></i>

                    <a href="#acerca-de" class="block px-4 py-2 text-sm text-primary dark:text-secondary">Acerca de</a>
                    <a href="#politicas" class="block px-4 py-2 text-sm text-primary dark:text-secondary">Políticas</a>
                    <a href="#contacto" class="block px-4 py-2 text-sm text-primary dark:text-secondary">Contacto</a>
                    
                    <!-- Botón de cambio de tema -->
                    <button id="theme-toggle" class="bg-primary text-white px-4 py-2 rounded dark:bg-secondary w-full text-center text-sm">
                        <i id="menu-theme-icon" class="fas fa-moon"></i> Tema Dark

            </div>
        </div>

    <!-- Fondo opaco -->

    <!-- Menú lateral -->

        <div class="p-4">
            <button id="close-menu" class="text-gray-700 dark:text-white">

        </div>
        <nav class="flex flex-col space-y-4 p-4">
            <a href="index.html" class="text-gray-700 hover:bg-gray-200 dark:text-white dark:hover:bg-secondary">Inicio</a>
            <a href="src/pages/history.html" class="text-gray-700 hover:bg-gray-200 dark:text-white dark:hover:bg-secondary">Historia</a>

    </div>

    <!-- 📌 Contenido Principal -->
    <main class="flex flex-col items-center justify-center flex-grow text-center px-6">
        <!-- Logo -->
        <img id="logo" src="src/assets/img/logo2.svg" alt="FutbolGo Logo" class="w-44 h-44 md:w-52 md:h-52 dark:hidden">
        <img id="logo-dark" src="src/assets/img/logo1.svg" alt="FutbolGo Logo" class="w-44 h-44 md:w-52 md:h-52 hidden dark:block">

        <!-- Slogan -->
        <h1 class="text-4xl text-secondary mt-4 dark:text-white font-heading">"Formando el futuro"</h1>

        <!-- Botones -->
        <div class="mt-6 flex flex-col md:flex-row gap-4">
            <a href="src/pages/auth/login.html" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-gray-dark transition dark:bg-secondary dark:hover:bg-gray-dark">Iniciar Sesión</a>
            <a href="src/pages/auth/register.html" class="bg-secondary text-white px-6 py-3 rounded-lg hover:bg-gray-dark transition dark:bg-secondary dark:hover:bg-gray-dark">Registrarse</a>

    <!-- 📌 Pie de página -->
    <footer class="bg-white text-center py-4 dark:bg-primary dark:text-white">
        <!-- Íconos de redes sociales -->
        <div class="flex justify-center space-x-4 mb-4">
          <a href="#" class="text-gray-700 dark:text-white hover:text-secondary dark:hover:text-secondary"><i class="fab fa-facebook-f"></i></a>
          <a href="#" class="text-gray-700 dark:text-white hover:text-secondary dark:hover:text-secondary"><i class="fab fa-twitter"></i></a>
          <a href="#" class="text-gray-700 dark:text-white hover:text-secondary dark:hover:text-secondary"><i class="fab fa-instagram"></i></a>
          <a href="#" class="text-gray-700 dark:text-white hover:text-secondary dark:hover:text-secondary"><i class="fab fa-youtube"></i></a>
        </div>
        <p class="text-sm">&copy; 2025. Todos los derechos reservados.</p>
    </footer>

    <!-- Botón de WhatsApp -->
    <div class="floating-button whatsapp-button" id="whatsapp-button">
        <i class="fab fa-whatsapp"></i>
    </div>

    <!-- Botón circular animado -->
    <div class="floating-button" id="pay-now-button">
        <i class="fas fa-credit-card"></i>
        <span>Pagos</span>
    </div>

    <!-- Script para menú hamburguesa -->
    <script src="./src/assets/js/menu.js" defer></script>
    <!-- Script para cambio de tema -->
    <script src="./src/assets/js/theme-toggle.js" defer></script>

    <script>
        document.getElementById('dropdown-btn').addEventListener('click', function() {
            const dropdownMenu = document.getElementById('dropdown-menu');
            const dropdownIcon = document.getElementById('dropdown-icon');
            dropdownMenu.classList.toggle('hidden');
            dropdownIcon.classList.toggle('fa-chevron-down');
            dropdownIcon.classList.toggle('fa-chevron-up');
        });

        document.getElementById('pay-now-button').addEventListener('click', function() {
            window.location.href = 'src/pages/payment.html';
        });

        document.getElementById('whatsapp-button').addEventListener('click', function() {
            window.location.href = 'https://wa.me/+573207763644'; // Reemplaza con el número de WhatsApp del club
        });

        function togglePayButton() {
            const button = document.getElementById('pay-now-button');
            button.classList.add('expanded');
            setTimeout(() => {
                if (button.querySelector('i').style.display === 'none') {
                    button.querySelector('i').style.display = 'inline';
                    button.querySelector('span').style.display = 'none';
                } else {
                    button.querySelector('i').style.display = 'none';
                    button.querySelector('span').style.display = 'inline';
                }
                button.classList.remove('expanded');
            }, 1000); // Duración de la animación
        }

        setInterval(togglePayButton, 3000); // Cambia entre el icono y el texto cada 3 segundos

        function logout() {
            // Aquí puedes agregar la lógica para cerrar la sesión
            window.location.href = '../index.html';
        }
    </script>

</body>
